name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache-dependency-path: edge-agent/go.sum
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run Go tests
        run: |
          cd edge-agent
          go test ./...
      - name: Run Python tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          python -m pytest -q

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build edge-agent image
        run: |
          docker build -t nti/edge-agent:latest -f edge-agent/Dockerfile .
      - name: Build backend api image
        run: |
          docker build -t nti/backend-api:latest -f backend/Dockerfile .
      - name: Scan edge-agent with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nti/edge-agent:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Scan backend-api with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nti/backend-api:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Validate Avro schema
        run: |
          python - <<'PY'
          import json
          from fastavro import parse_schema
          f='schemas/network_metric.avsc'
          schema=json.load(open(f))
          parse_schema(schema)
          print('Avro schema OK')
          PY
