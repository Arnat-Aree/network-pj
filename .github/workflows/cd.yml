name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build and push edge-agent
        run: |
          docker build -t ${{ secrets.REGISTRY_HOST }}/network-pj/edge-agent:${{ github.sha }} -f edge-agent/Dockerfile .
          docker push ${{ secrets.REGISTRY_HOST }}/network-pj/edge-agent:${{ github.sha }}
      - name: Build and push lab-api
        run: |
          docker build -t ${{ secrets.REGISTRY_HOST }}/network-pj/lab-api:${{ github.sha }} -f lab/Dockerfile .
          docker push ${{ secrets.REGISTRY_HOST }}/network-pj/lab-api:${{ github.sha }}
      - name: Deploy to Kubernetes
        run: |
          echo "Setting up kubeconfig"
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          kubectl set image deployment/edge-agent edge-agent=${{ secrets.REGISTRY_HOST }}/network-pj/edge-agent:${{ github.sha }} --record || true
          kubectl set image deployment/nta-api nta-api=${{ secrets.REGISTRY_HOST }}/network-pj/lab-api:${{ github.sha }} --record || true
          kubectl apply -f k8s/edge-agent-deployment.yaml || true
          kubectl apply -f k8s/api-deployment.yaml || true
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
